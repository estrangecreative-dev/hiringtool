<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Review — Senior Product Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface2: #1a1a1e;
    --border: #252529;
    --border2: #2e2e34;
    --text: #f0f0f2;
    --text2: #8888a0;
    --text3: #55556a;
    --accent: #c8f55a;
    --accent2: #7b6ef6;
    --red: #f55a6e;
    --amber: #f5b55a;
    --green: #5af599;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
    --sidebar-w: 300px;
    --header-h: 52px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  .header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; z-index: 100; }
  .brand-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2.5s ease-in-out infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100% { opacity:1;transform:scale(1); } 50% { opacity:0.5;transform:scale(0.8); } }
  .brand-label { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .header-role { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.04em; padding: 3px 8px; border: 1px solid var(--border2); border-radius: 4px; }
  .header-stats { margin-left: auto; display: flex; align-items: center; gap: 20px; }
  .stat { display: flex; flex-direction: column; align-items: flex-end; }
  .stat-n { font-size: 15px; font-weight: 700; line-height: 1; }
  .stat-l { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .header-sep { width: 1px; height: 24px; background: var(--border); }

  /* LAYOUT */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-search { padding: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-icon { position: absolute; left: 10px; color: var(--text3); font-size: 13px; pointer-events: none; }
  #search { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 8px 10px 8px 30px; border-radius: 6px; outline: none; transition: border-color 0.2s; }
  #search::placeholder { color: var(--text3); }
  #search:focus { border-color: var(--accent2); }
  .sidebar-filters { padding: 8px 12px; display: flex; gap: 6px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .filter-btn { font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--text3); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0d0f; font-weight: 600; }
  .sidebar-count { padding: 6px 12px; font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.04em; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .sidebar-pagination { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .page-info { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .page-btn { font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .page-btn:hover:not(:disabled) { border-color: var(--text3); color: var(--text); background: var(--surface2); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  .candidate-row { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; transition: background 0.1s; position: relative; }
  .candidate-row:hover { background: var(--surface2); }
  .candidate-row.active { background: rgba(200,245,90,0.06); border-left: 2px solid var(--accent); padding-left: 10px; }
  .candidate-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .candidate-info { flex: 1; min-width: 0; }
  .candidate-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
  .candidate-meta { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 2px; display: flex; gap: 6px; }
  .dot-li { width: 5px; height: 5px; border-radius: 50%; background: #0077b5; display:inline-block; }
  .dot-gh { width: 5px; height: 5px; border-radius: 50%; background: var(--green); display:inline-block; }
  .status-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .status-badge.unreviewed { background: rgba(255,255,255,0.04); color: var(--text3); border: 1px solid var(--border2); }
  .status-badge.starred { background: rgba(245,181,90,0.15); color: var(--amber); border: 1px solid rgba(245,181,90,0.3); }
  .status-badge.shortlisted { background: rgba(90,245,153,0.15); color: var(--green); border: 1px solid rgba(90,245,153,0.3); }
  .status-badge.pass { background: rgba(245,90,110,0.1); color: var(--red); border: 1px solid rgba(245,90,110,0.2); }

  .status-wrap { position: relative; flex-shrink: 0; }
  .status-dropdown { display: none; position: absolute; right: 0; top: 100%; margin-top: 4px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; overflow: hidden; z-index: 200; min-width: 100px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .status-wrap.open .status-dropdown { display: block; }
  .status-option { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; padding: 7px 12px; cursor: pointer; transition: background 0.1s; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .status-option:hover { background: var(--surface); }
  .status-option.opt-starred { color: var(--amber); }
  .status-option.opt-shortlisted { color: var(--green); }
  .status-option.opt-pass { color: var(--red); }

  .no-port-badge { font-family: var(--mono); font-size: 9px; padding: 2px 5px; background: rgba(123,110,246,0.12); color: var(--accent2); border: 1px solid rgba(123,110,246,0.25); border-radius: 3px; }

  /* PREVIEW */
  .preview-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  .preview-toolbar { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
  .preview-name { font-size: 14px; font-weight: 700; white-space: nowrap; }
  .preview-url { font-family: var(--mono); font-size: 11px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }
  .preview-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .action-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border2); background: transparent; color: var(--text2); text-decoration: none; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .action-btn:hover { border-color: var(--text3); color: var(--text); background: var(--surface2); }
  .action-btn.port { border-color: rgba(200,245,90,0.3); color: var(--accent); }
  .action-btn.port:hover { background: rgba(200,245,90,0.08); }
  .action-btn.li { border-color: rgba(0,119,181,0.3); color: #0ea5e9; }
  .action-btn.li:hover { background: rgba(14,165,233,0.08); }

  /* SCREENSHOT AREA */
  .preview-content { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }

  .screenshot-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: auto;
    padding: 32px;
    gap: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .screenshot-card {
    width: 100%;
    max-width: 960px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }

  .browser-chrome {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .browser-dots { display: flex; gap: 6px; }
  .browser-dot { width: 10px; height: 10px; border-radius: 50%; }
  .browser-dot.red { background: #f55a6e; }
  .browser-dot.yellow { background: #f5b55a; }
  .browser-dot.green { background: #5af599; }
  .browser-bar {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .screenshot-img-wrap {
    position: relative;
    width: 100%;
    min-height: 520px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .screenshot-img {
    width: 100%;
    display: block;
    transition: opacity 0.4s;
  }

  /* Loading state */
  .loading-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--bg);
    transition: opacity 0.3s;
  }
  .loading-state.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.04em;
  }

  /* Error state */
  .error-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .error-state.visible { opacity: 1; pointer-events: all; }
  .error-icon { font-size: 32px; opacity: 0.3; }
  .error-text { font-family: var(--mono); font-size: 12px; color: var(--text3); text-align: center; line-height: 1.7; }
  .retry-btn, .open-btn {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 7px 16px; border-radius: 5px; border: none; cursor: pointer; transition: opacity 0.15s; text-decoration: none;
  }
  .retry-btn { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
  .retry-btn:hover { color: var(--text); border-color: var(--text3); }
  .open-btn { background: var(--accent); color: #0d0d0f; font-weight: 600; }
  .open-btn:hover { opacity: 0.85; }
  .btn-row { display: flex; gap: 8px; }

  /* No portfolio state */
  .no-port-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  }
  .no-port-glyph { font-size: 40px; opacity: 0.15; }
  .no-port-text { font-family: var(--mono); font-size: 12px; color: var(--text3); text-align: center; line-height: 1.8; }

  /* Empty state */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .empty-glyph { font-size: 48px; opacity: 0.08; }
  .empty-text { font-family: var(--mono); font-size: 12px; color: var(--text3); text-align: center; line-height: 1.7; }

  /* KEYS HINT */
  .keys-hint { position: fixed; bottom: 14px; right: 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 12px; display: flex; gap: 14px; opacity: 0.55; transition: opacity 0.2s; }
  .keys-hint:hover { opacity: 1; }
  .key { font-family: var(--mono); font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
  kbd { background: var(--surface); border: 1px solid var(--border2); border-radius: 3px; padding: 1px 5px; font-size: 10px; font-family: var(--mono); color: var(--text2); }

  /* FEED TOGGLE */
  #feed-toggle.active { background: var(--accent2); border-color: var(--accent2); color: #fff; font-weight: 600; }

  /* FEED VIEW */
  .feed-view {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .feed-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    max-width: 960px;
    width: 100%;
    flex-shrink: 0;
  }
  .feed-card:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .feed-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  .feed-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .feed-card-name { font-size: 14px; font-weight: 600; flex: 1; }
  .feed-card-url { font-family: var(--mono); font-size: 10px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }

  .feed-card-img-wrap {
    position: relative;
    width: 100%;
    min-height: 200px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .feed-card-img {
    width: 100%;
    display: block;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .feed-card-img.loaded { opacity: 1; }

  .feed-card-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }
  .feed-card-placeholder.hidden { display: none; }

  .feed-no-portfolio {
    padding: 40px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="brand-dot"></div>
    <span class="brand-label">Portfolio Review</span>
  </div>
  <span class="header-role">Senior Product Designer · Core Business Experience</span>
  <div class="header-stats">
    <div class="stat"><span class="stat-n">199</span><span class="stat-l">Candidates</span></div>
    <div class="header-sep"></div>
    <div class="stat"><span class="stat-n">176</span><span class="stat-l">Portfolios</span></div>
    <div class="header-sep"></div>
    <div class="stat"><span class="stat-n" id="hdr-starred">0</span><span class="stat-l">Starred</span></div>
    <div class="header-sep"></div>
    <div class="stat"><span class="stat-n" id="hdr-shortlisted">0</span><span class="stat-l">Shortlisted</span></div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-search">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Search candidates..." oninput="filterList()">
      </div>
    </div>
    <div class="sidebar-filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('portfolio',this)">Portfolio</button>
      <button class="filter-btn" onclick="setFilter('starred',this)">Yes</button>
      <button class="filter-btn" onclick="setFilter('shortlisted',this)">Maybe</button>
      <button class="filter-btn" onclick="setFilter('pass',this)">✗ Pass</button>
      <span style="width:1px;height:16px;background:var(--border2);margin:0 2px;align-self:center"></span>
      <button class="filter-btn" id="feed-toggle" onclick="toggleFeed()">☰ Feed</button>
    </div>
    <div class="sidebar-count" id="sidebar-count">176 with portfolio · 23 without</div>
    <div class="sidebar-list" id="candidate-list"></div>
    <div class="sidebar-pagination">
      <button class="page-btn" id="page-prev" onclick="changePage(-1)">← Prev</button>
      <span class="page-info" id="page-info">1 / 1</span>
      <button class="page-btn" id="page-next" onclick="changePage(1)">Next →</button>
    </div>
  </div>

  <div class="preview-pane">
    <div class="preview-toolbar">
      <span class="preview-name" id="preview-name">Select a candidate</span>
      <span class="preview-url" id="preview-url"></span>
      <div class="preview-actions" id="preview-actions"></div>
    </div>
    <div class="preview-content" id="preview-content">
      <div class="empty-state">
        <div class="empty-glyph">◈</div>
        <div class="empty-text">Select a candidate from the list<br>to view their portfolio screenshot</div>
      </div>
    </div>
  </div>
</div>

<div class="keys-hint">
  <span class="key"><kbd>↑</kbd><kbd>↓</kbd> Navigate</span>
  <span class="key"><kbd>S</kbd> Yes</span>
  <span class="key"><kbd>G</kbd> Maybe</span>
  <span class="key"><kbd>P</kbd> Pass</span>
  <span class="key"><kbd>O</kbd> Open</span>
  <span class="key"><kbd>F</kbd> Feed</span>
</div>

const STATUS_NEXT = { unreviewed:'starred', starred:'shortlisted', shortlisted:'pass', pass:'unreviewed' };
const STATUS_LABELS = { unreviewed:'—', starred:'Yes', shortlisted:'Maybe', pass:'Pass' };

const PAGE_SIZE = 25;
const screenshotCache = {};
let statuses = {};
let activeIdx = null;
let currentFilter = 'all';

function screenshotUrl(url) {
  return `https://s.wordpress.com/mshots/v1/${encodeURIComponent(url)}?w=1280&h=960`;
}

function initials(name) {
  return name.split(' ').filter(Boolean).map(w=>w[0].toUpperCase()).slice(0,2).join('');
}
function avatarStyle(name) {
  const palettes = [
    ['#c8f55a','#0a0a0a'],['#7b6ef6','#fff'],['#5af599','#0a0a0a'],
    ['#f5b55a','#0a0a0a'],['#f55a6e','#fff'],['#5ab4f5','#0a0a0a'],
    ['#e87df5','#0a0a0a'],['#f5d45a','#0a0a0a'],
  ];
  let h = 0; for (const c of name) h = ((h<<5)-h+c.charCodeAt(0))|0;
  const [bg,fg] = palettes[Math.abs(h) % palettes.length];
  return `background:${bg};color:${fg}`;
}


function renderList() {
  const list = document.getElementById('candidate-list');
  const q = searchQuery.toLowerCase();
  visibleIndices = [];
  CANDIDATES.forEach((c,i) => {
    const status = statuses[i] || 'unreviewed';
    const matchSearch = !q || c.name.toLowerCase().includes(q);
    const matchFilter =
      currentFilter === 'all' ||
      (currentFilter === 'portfolio' && c.portfolio) ||
      (currentFilter === 'starred' && status === 'starred') ||
      (currentFilter === 'shortlisted' && status === 'shortlisted') ||
      (currentFilter === 'pass' && status === 'pass');
    if (matchSearch && matchFilter) visibleIndices.push(i);
  });

  const totalPages = Math.max(1, Math.ceil(visibleIndices.length / PAGE_SIZE));
  if (currentPage >= totalPages) currentPage = totalPages - 1;
  if (currentPage < 0) currentPage = 0;
  pageIndices = visibleIndices.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);

  const withPort = visibleIndices.filter(i => CANDIDATES[i].portfolio).length;

  document.getElementById('page-info').textContent = (currentPage + 1) + ' / ' + totalPages;
  document.getElementById('page-prev').disabled = currentPage === 0;

function changePage(delta) {

let prefetchQueue = [];
let activePrefetches = 0;
const MAX_CONCURRENT = 4;

function prefetchPageThumbnails() {
  prefetchQueue = [];
  activePrefetches = 0;
  pageIndices.forEach(i => {
    const c = CANDIDATES[i];
    if (c.portfolio && !screenshotCache[i]) {
      prefetchQueue.push(i);
    }
  });
  drainPrefetchQueue();
}

function drainPrefetchQueue() {
  while (activePrefetches < MAX_CONCURRENT && prefetchQueue.length > 0) {
    const i = prefetchQueue.shift();
    if (screenshotCache[i] && screenshotCache[i] !== 'pending') continue;
    screenshotCache[i] = 'loading';
    activePrefetches++;
    fetchWithRetry(i, 0);
  }
}

function fetchWithRetry(i, attempt) {
  const img = new Image();
  const src = screenshotUrl(CANDIDATES[i].portfolio);
  img.onload = () => {
    // mshots returns a 400x300 placeholder while generating — retry up to 8 times
    if (img.naturalWidth <= 400 && img.naturalHeight <= 300 && attempt < 8) {
      setTimeout(() => fetchWithRetry(i, attempt + 1), 3000);
      return;
    }
    screenshotCache[i] = src;
    activePrefetches--;
    drainPrefetchQueue();
  };
  img.onerror = () => { screenshotCache[i] = 'error'; activePrefetches--; drainPrefetchQueue(); };
  // Cache-bust only on retries so CDN picks up the newly generated screenshot
  img.src = attempt > 0 ? src + '&_r=' + attempt : src;
}

function selectCandidate(idx) {

function loadScreenshot(idx, url) {
  const img = document.getElementById(`ss-img-${idx}`);
  const loading = document.getElementById(`loading-${idx}`);
  const error = document.getElementById(`error-${idx}`);
  if (!img) return;

  const cached = screenshotCache[idx];

  // Already prefetched — show instantly
  if (cached && cached !== 'loading' && cached !== 'error') {
    img.src = cached;
    img.style.opacity = '1';
    if (loading) loading.classList.add('hidden');
    if (error) error.classList.remove('visible');
    return;
  }

  // Prefetch failed — show error immediately
  if (cached === 'error') {
    if (loading) loading.classList.add('hidden');
    if (error) error.classList.add('visible');
    return;
  }

  // Prefetch still in progress — wait for it
  if (cached === 'loading') {
    const poll = setInterval(() => {
      const st = screenshotCache[idx];
      if (st === 'loading') return;
      clearInterval(poll);
      loadScreenshot(idx, url);
    }, 100);
    return;
  }

  // No cache — load fresh
  const src = screenshotUrl(url);
  img.onload = () => {
    img.style.opacity = '1';
    if (loading) loading.classList.add('hidden');
    if (error) error.classList.remove('visible');
    screenshotCache[idx] = src;
  };
  img.onerror = () => {
    if (loading) loading.classList.add('hidden');
    if (error) error.classList.add('visible');
    screenshotCache[idx] = 'error';
  };
  img.src = src;
}

function retryScreenshot(idx) {
  const c = CANDIDATES[idx];
  if (!c?.portfolio) return;
  const error = document.getElementById(`error-${idx}`);
  const loading = document.getElementById(`loading-${idx}`);
  const img = document.getElementById(`ss-img-${idx}`);
  if (error) error.classList.remove('visible');
  if (loading) loading.classList.remove('hidden');
  if (img) { img.style.opacity='0'; img.src=''; }
  setTimeout(() => loadScreenshot(idx, c.portfolio), 300);
}

function toggleDropdown(idx) {
  const wrap = document.querySelector(`.status-wrap[data-idx="${idx}"]`);
  const wasOpen = wrap?.classList.contains('open');
  closeAllDropdowns();
  if (!wasOpen && wrap) wrap.classList.add('open');
}

function closeAllDropdowns() {
  document.querySelectorAll('.status-wrap.open').forEach(w => w.classList.remove('open'));
}

function setStatus(idx, status) {
  statuses[idx] = status;
  closeAllDropdowns();
  renderList();
  if (idx === activeIdx && !feedMode) loadPreview(idx);
  updateStats();
}

function cycleStatus(idx) {
  statuses[idx] = STATUS_NEXT[statuses[idx]||'unreviewed'];
  renderList();
  if (idx === activeIdx && !feedMode) loadPreview(idx);
  updateStats();
}

function updateStats() {

function renderFeed() {

  toolbar.style.display = 'none';

  const content = document.getElementById('preview-content');
  content.innerHTML = '<div class="feed-view" id="feed-container"></div>';

    container.innerHTML = '<div class="empty-state"><div class="empty-glyph">◈</div><div class="empty-text">No candidates match current filters</div></div>';
    return;
  }

    const c = CANDIDATES[i];
    const status = statuses[i] || 'unreviewed';
    const card = document.createElement('div');
    card.className = 'feed-card' + (i === activeIdx ? ' active' : '');

      card.innerHTML = `

          <img class="feed-card-img" id="feed-img-${i}" data-idx="${i}" alt="${c.name}" />
        </div>`;
    }

    card.addEventListener('click', () => {
      activeIdx = i;
      renderList();
      container.querySelectorAll('.feed-card').forEach(fc => fc.classList.remove('active'));
      card.classList.add('active');
    });

    container.appendChild(card);
  });

  setupFeedObserver();
}

function setupFeedObserver() {
  const container = document.getElementById('feed-container');
  if (!container) return;

  function loadVisible() {
    const cRect = container.getBoundingClientRect();
    container.querySelectorAll('.feed-card-img-wrap').forEach(wrap => {
      if (wrap.dataset.loaded) return;
      const r = wrap.getBoundingClientRect();
      // Load if within 400px of visible area
      if (r.bottom > cRect.top - 400 && r.top < cRect.bottom + 400) {
        wrap.dataset.loaded = '1';
        const img = wrap.querySelector('.feed-card-img');
        if (img) loadFeedScreenshot(parseInt(img.dataset.idx));
      }
    });
  }

  // Load initially visible cards right away
  loadVisible();
  // Load more as user scrolls
  container.addEventListener('scroll', loadVisible, { passive: true });
}

function loadFeedScreenshot(idx) {
  const img = document.getElementById(`feed-img-${idx}`);
  const ph = document.getElementById(`feed-ph-${idx}`);
  if (!img) return;
  const c = CANDIDATES[idx];
  if (!c.portfolio) return;

  const cached = screenshotCache[idx];

  if (cached && cached !== 'loading' && cached !== 'error') {
    img.src = cached;
    img.classList.add('loaded');
    if (ph) ph.classList.add('hidden');
    return;
  }

  if (cached === 'error') {
    if (ph) { ph.innerHTML = '<span>Screenshot unavailable</span>'; }
    return;
  }

  if (cached === 'loading') {
    const poll = setInterval(() => {
      const st = screenshotCache[idx];
      if (st === 'loading') return;
      clearInterval(poll);
      loadFeedScreenshot(idx);
    }, 200);
    return;
  }

  const src = screenshotUrl(c.portfolio);
  img.onload = () => {
    img.classList.add('loaded');
    if (ph) ph.classList.add('hidden');
    screenshotCache[idx] = src;
  };
  img.onerror = () => {
    if (ph) { ph.innerHTML = '<span>Screenshot unavailable</span>'; }
    screenshotCache[idx] = 'error';
  };
  img.src = src;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.status-wrap')) closeAllDropdowns();
});

document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  const pos = pageIndices.indexOf(activeIdx);
  if (e.key==='ArrowDown') {
    e.preventDefault();
    if (pos < pageIndices.length-1) {
      selectCandidate(pageIndices[pos+1]);
    } else if (currentPage < Math.ceil(visibleIndices.length/PAGE_SIZE)-1) {
      changePage(1); selectCandidate(pageIndices[0]);
    }
  } else if (e.key==='ArrowUp') {
    e.preventDefault();
    if (pos > 0) {
      selectCandidate(pageIndices[pos-1]);
    } else if (currentPage > 0) {
      changePage(-1); selectCandidate(pageIndices[pageIndices.length-1]);
    }
  } else if (e.key==='ArrowRight') {
    e.preventDefault(); if (currentPage < Math.ceil(visibleIndices.length/PAGE_SIZE)-1) changePage(1);
  } else if (e.key==='ArrowLeft') {
    e.preventDefault(); if (currentPage > 0) changePage(-1);
  } else if (e.key.toLowerCase()==='s') {
    if (activeIdx!==null) { statuses[activeIdx]='starred'; renderList(); if (!feedMode) loadPreview(activeIdx); updateStats(); }
  } else if (e.key.toLowerCase()==='g') {
    if (activeIdx!==null) { statuses[activeIdx]='shortlisted'; renderList(); if (!feedMode) loadPreview(activeIdx); updateStats(); }
  } else if (e.key.toLowerCase()==='p') {
    if (activeIdx!==null) { statuses[activeIdx]='pass'; renderList(); if (!feedMode) loadPreview(activeIdx); updateStats(); }
  } else if (e.key.toLowerCase()==='o') {
    if (activeIdx!==null && CANDIDATES[activeIdx]?.portfolio) window.open(CANDIDATES[activeIdx].portfolio,'_blank');
  } else if (e.key.toLowerCase()==='f') {
    toggleFeed();
  }
});

renderList();
</script>
</body>
